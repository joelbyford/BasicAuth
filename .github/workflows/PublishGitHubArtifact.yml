# This is a basic workflow to help you get started with Actions

name: Manually Publish GitHub Artifact

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write   # REQUIRED for OIDC

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OUTPUT_DIRECTORY: ./output
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      
      # Get the latest version tag to duplicate it in the nuget package
      - uses: oprypin/find-latest-tag@v1
        with:
          repository: joelbyford/BasicAuth  # The repository to scan.
          releases-only: true  # We know that all relevant tags have a GitHub release for them.
        id: latesttag  # The step ID to refer to later.
      
      # Install DotNet SDK
      - name: Setup dotnet 10.x
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 10.x
          
      # Restore Dependencies (can be omitted if you remove --no-restore on build step)
      - name: Restore package dependencies
        run: dotnet restore

      # Build the project
      - name: dotnet build
        run: dotnet build --no-restore --configuration Release -o ${{ env.OUTPUT_DIRECTORY}}
      
        # Authenticate to Azure to use Artifact Signing
      - name: 'Authenticate to Azure'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Sign the binaries using Artifact Signing
      - name: Sign binaries with Artifact Signing
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: https://wus.codesigning.azure.net
          signing-account-name: artSignByford
          certificate-profile-name: pub-trust-github
          files-folder: ${{ env.OUTPUT_DIRECTORY }}
          files-folder-filter: dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Pack the project
      - name: dotnet pack
        if: success()  # this should be implied, but adding just to be sure this runs only when the previous steps are successfull
        run: dotnet pack --no-build --no-restore -c Release -p:PackageVersion=${{ steps.latesttag.outputs.tag }} -o ${{env.OUTPUT_DIRECTORY}}

      # Sign the NuGet package using Artifact Signing
      - name: Sign NuGet package with Artifact Signing
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: https://wus.codesigning.azure.net
          signing-account-name: artSignByford
          certificate-profile-name: pub-trust-github
          files-folder: ${{ env.OUTPUT_DIRECTORY }}
          files-folder-filter: nupkg
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Publish the artifact to GitHub Packages
      - name: Publish to GitHub Packages
        run: dotnet nuget push "**/*.nupkg" \
            --source "https://nuget.pkg.github.com/joelbyford/index.json" \
            --skip-duplicate


        
      
